version: '3.8'

services:
  # Application service running PHP-FPM and Nginx
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bms_app
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443" # Expose HTTPS port (https://localhost:8443)
    volumes:
      - .:/var/www/html
      # Avoid overwriting container's vendor directory with host's vendor folder
      - /var/www/html/vendor
      # Mount Nginx SSL config and certificates for local development
      - ./docker/nginx/default-ssl.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    environment:
      - CI_ENVIRONMENT=development
      - DB_HOSTNAME=db
      - DB_DATABASE=bms_db
      - DB_USERNAME=bms_user
      - DB_PASSWORD=bms_password
      - DB_DRIVER=MySQLi
      - DB_PORT=3306
    depends_on:
      - db

  # Database service running MySQL
  db:
    image: mysql:8.0
    container_name: bms_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=bms_db
      - MYSQL_USER=bms_user
      - MYSQL_PASSWORD=bms_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
